name: CI — Job Service (Java/Spring Boot)

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/job-service/**'
      - '.github/workflows/ci-job-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/job-service/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/job-service

jobs:
  # ─── Build & Test ────────────────────────────────────────────────────────────
  build-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/job-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: jobdb_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Run Tests
        run: mvn clean verify -B
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/jobdb_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres123
          SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Job Service Tests
          path: '**/surefire-reports/*.xml'
          reporter: java-junit

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v4
        with:
          file: services/job-service/target/site/jacoco/jacoco.xml
          flags: job-service

  # ─── SAST — Static Security Scan ────────────────────────────────────────────
  sast:
    name: SAST Security Scan
    runs-on: ubuntu-latest
    needs: build-test
    defaults:
      run:
        working-directory: services/job-service

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # OWASP Dependency Check
      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionFiles=dependency-check-suppressions.xml || true

      # SonarCloud SAST
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: services/job-service
        continue-on-error: true

  # ─── Docker Build & Trivy Scan ───────────────────────────────────────────────
  docker-build:
    name: Docker Build & Container Scan
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/job-service
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy container vulnerability scan
      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/job-service:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results-job.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-job.sarif'

      - name: Push Docker image
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: services/job-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
