name: CI — User Service (Python/FastAPI)

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/user-service/**'
      - '.github/workflows/ci-user-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/user-service/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/user-service

jobs:
  build-test:
    name: Lint, Test & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/user-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: userdb_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      # Linting
      - name: Lint with Ruff
        run: pip install ruff && ruff check .

      # SAST — Bandit
      - name: Security Scan (Bandit)
        run: pip install bandit && bandit -r app/ -ll || true

      # Dependency vulnerability scan
      - name: Dependency Audit (Safety)
        run: pip install safety && safety check -r requirements.txt || true

      - name: Run Tests with Coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=70
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres123@localhost:5432/userdb_test
          REDIS_HOST: localhost
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          JWT_SECRET_KEY: test-secret-key

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: services/user-service/coverage.xml
          flags: user-service

  docker-build:
    name: Docker Build & Trivy Scan
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/user-service
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/user-service:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results-user.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-user.sarif'

      - name: Push Docker image
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: services/user-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
