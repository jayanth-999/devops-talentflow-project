name: CI — Notification Service (.NET)

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/notification-service/**'
      - '.github/workflows/ci-notification-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/notification-service/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/notification-service
  DOTNET_VERSION: '10.0.x'

jobs:
  build-test:
    name: Build, Test & Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore services/notification-service/src/NotificationService/NotificationService.csproj

      - name: Build
        run: dotnet build services/notification-service/src/NotificationService/NotificationService.csproj --no-restore -c Release

      - name: Run Tests
        run: |
          if [ -d "services/notification-service/tests" ] && find services/notification-service/tests -name "*.csproj" | grep -q .; then
            dotnet test services/notification-service/ --no-build -c Release --verbosity normal \
              --collect:"XPlat Code Coverage" \
              --results-directory TestResults
          else
            echo "No test projects found, skipping..."
          fi

      # Security Code Scan (SAST)
      - name: Security Code Scan
        uses: security-code-scan/security-code-scan-add-action@1.2
        continue-on-error: true

      # NuGet vulnerability audit
      - name: NuGet Vulnerability Audit
        run: |
          dotnet list services/notification-service/src/NotificationService/NotificationService.csproj package --vulnerable --include-transitive || true

  docker-build:
    name: Docker Build & Trivy Scan
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/notification-service
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/notification-service:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results-notification.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-notification.sarif'

      - name: Push Docker image
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: services/notification-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
