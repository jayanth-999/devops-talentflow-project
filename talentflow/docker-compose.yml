version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# TalentFlow — Full Stack Docker Compose (Local Development)
# Usage: docker-compose up -d
# ─────────────────────────────────────────────────────────────────────────────

networks:
  talentflow-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  mongo-data:
  kafka-data:
  zookeeper-data:


# ─── Infrastructure Services ──────────────────────────────────────────────────
services:

  # PostgreSQL — shared relational DB (separate databases per service)
  postgres:
    image: postgres:16-alpine
    container_name: talentflow-postgres
    networks: [talentflow-net]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis — session management and token blacklisting
  redis:
    image: redis:7-alpine
    container_name: talentflow-redis
    networks: [talentflow-net]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # MongoDB — notification logs
  mongodb:
    image: mongo:7
    container_name: talentflow-mongodb
    networks: [talentflow-net]
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: notifications
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper (Kafka dependency)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: talentflow-zookeeper
    networks: [talentflow-net]
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Apache Kafka — message broker
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: talentflow-kafka
    networks: [talentflow-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Kafka-UI — web UI for Kafka inspection
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: talentflow-kafka-ui
    networks: [talentflow-net]
    depends_on: [kafka]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092


  # ─── Application Services ─────────────────────────────────────────────────

  # User Service (Python / FastAPI)
  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: talentflow-user-service
    networks: [talentflow-net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres123@postgres:5432/userdb
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-dev-secret-change-in-prod}
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      JAEGER_AGENT_HOST: jaeger
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # Job Service (Java / Spring Boot)
  job-service:
    build:
      context: ./services/job-service
      dockerfile: Dockerfile
    container_name: talentflow-job-service
    networks: [talentflow-net]
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jobdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_TRACING_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3
    restart: unless-stopped

  # Notification Service (.NET / ASP.NET Core)
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: talentflow-notification-service
    networks: [talentflow-net]
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8002:8002"
    environment:
      ASPNETCORE_URLS: http://+:8002
      ASPNETCORE_ENVIRONMENT: Development
      MongoDB__Uri: mongodb://mongodb:27017
      MongoDB__Database: notifications
      Kafka__BootstrapServers: kafka:9092
      Jaeger__AgentHost: jaeger
      Notification__MockEmail: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  # Frontend (React / Vite → NGINX)
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: talentflow-frontend
    networks: [talentflow-net]
    depends_on:
      - user-service
      - job-service
    ports:
      - "3000:3000"
    restart: unless-stopped
