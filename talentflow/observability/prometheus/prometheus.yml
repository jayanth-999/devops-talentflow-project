global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'talentflow-local'
    environment: 'development'

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # User Service (FastAPI + prometheus-fastapi-instrumentator)
  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:8001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Job Service (Spring Boot Actuator)
  - job_name: 'job-service'
    static_configs:
      - targets: ['job-service:8080']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s

  # Notification Service (.NET prometheus-net)
  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8002']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Node Exporter (if running)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
